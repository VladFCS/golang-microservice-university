apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-privileged-demo
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-privileged-demo
  template:
    metadata:
      labels:
        app: bad-privileged-demo
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: app
          image: ghcr.io/vladfcs/golang-microservice-university-gateway-service:sha-e98a03f
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            privileged: true
            runAsNonRoot: true
