apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-run-as-nonroot-demo
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-run-as-nonroot-demo
  template:
    metadata:
      labels:
        app: bad-run-as-nonroot-demo
    spec:
      containers:
        - name: app
          image: ghcr.io/vladfcs/golang-microservice-university-gateway-service:v1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

