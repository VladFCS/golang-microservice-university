apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-nonroot
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
spec:
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - app
      validate:
        failureAction: Enforce
        message: "Running as root is not allowed. Set runAsNonRoot=true at pod or container level."
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
              "=(ephemeralContainers)":
                - "=(securityContext)":
                    "=(runAsNonRoot)": true
              "=(initContainers)":
                - "=(securityContext)":
                    "=(runAsNonRoot)": true
              containers:
                - "=(securityContext)":
                    "=(runAsNonRoot)": true
          - spec:
              "=(ephemeralContainers)":
                - securityContext:
                    runAsNonRoot: true
              "=(initContainers)":
                - securityContext:
                    runAsNonRoot: true
              containers:
                - securityContext:
                    runAsNonRoot: true
