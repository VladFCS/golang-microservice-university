apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: demo
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/component: grpc
    app.kubernetes.io/part-of: microservices-grpc-kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-service
        app.kubernetes.io/component: grpc
        app.kubernetes.io/part-of: microservices-grpc-kubernetes
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inventory-service
          image: ghcr.io/vladfcs/golang-microservice-university-inventory-service@sha256:ff5f9779ffde6f32d7358d9b2cfe81c848f94b4507bf3fb01b5e5a1ed81bf007
          imagePullPolicy: IfNotPresent
          env:
            - name: GRPC_PORT
              value: "50052"
            - name: HEALTH_PORT
              value: "8082"
          ports:
            - name: grpc
              containerPort: 50052
            - name: health
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
