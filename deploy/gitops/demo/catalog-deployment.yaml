apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: demo
  labels:
    app.kubernetes.io/name: catalog-service
    app.kubernetes.io/component: grpc
    app.kubernetes.io/part-of: microservices-grpc-kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-service
        app.kubernetes.io/component: grpc
        app.kubernetes.io/part-of: microservices-grpc-kubernetes
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: catalog-service
          image: ghcr.io/vladfcs/devsecops-pipeline-for-microservice-catalog-service@sha256:96cb7a080192531f2e46bc349e6588aceede87312c3cd1c65ba42ce3743f405e
          imagePullPolicy: IfNotPresent
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: HEALTH_PORT
              value: "8081"
          ports:
            - name: grpc
              containerPort: 50051
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
