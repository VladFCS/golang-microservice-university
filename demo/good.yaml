apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-good
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-good
  template:
    metadata:
      labels:
        app: demo-good
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: app
          image: ghcr.io/vladfcs/golang-microservice-university-gateway-service:v1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

