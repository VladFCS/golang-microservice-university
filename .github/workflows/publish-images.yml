name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-service
            dockerfile: deployments/docker/gateway-service.Dockerfile
          - service: catalog-service
            dockerfile: deployments/docker/catalog-service.Dockerfile
          - service: inventory-service
            dockerfile: deployments/docker/inventory-service.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e TRIVY_USERNAME \
            -e TRIVY_PASSWORD \
            -v "$PWD:/workdir" \
            aquasec/trivy:0.69.3 \
            image \
            --format cyclonedx \
            --output /workdir/sbom-${{ matrix.service }}.cdx.json \
            ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json
          if-no-files-found: error

      - name: Sign image with cosign keyless
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: cosign sign "${IMAGE_REF}"

      - name: Attach SBOM attestation
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest \
            --type cyclonedx \
            --predicate sbom-${{ matrix.service }}.cdx.json \
            "${IMAGE_REF}"
