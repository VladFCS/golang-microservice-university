name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "deploy/gitops/**"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-service
            dockerfile: deployments/docker/gateway-service.Dockerfile
          - service: catalog-service
            dockerfile: deployments/docker/catalog-service.Dockerfile
          - service: inventory-service
            dockerfile: deployments/docker/inventory-service.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e TRIVY_USERNAME \
            -e TRIVY_PASSWORD \
            -v "$PWD:/workdir" \
            aquasec/trivy:0.69.3 \
            image \
            --format cyclonedx \
            --output /workdir/sbom-${{ matrix.service }}.cdx.json \
            ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json
          if-no-files-found: error

      - name: Sign image with cosign keyless
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: cosign sign "${IMAGE_REF}"

      - name: Attach SBOM attestation
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest \
            --type cyclonedx \
            --predicate sbom-${{ matrix.service }}.cdx.json \
            "${IMAGE_REF}"

      - name: Record GitOps image reference
        run: |
          printf '%s\n' \
            "ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}" \
            > image-ref-${{ matrix.service }}.txt

      - name: Upload GitOps image reference
        uses: actions/upload-artifact@v4
        with:
          name: image-ref-${{ matrix.service }}
          path: image-ref-${{ matrix.service }}.txt
          if-no-files-found: error

  update-gitops:
    name: Update GitOps Manifests
    if: github.ref == 'refs/heads/main'
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download published image refs
        uses: actions/download-artifact@v4
        with:
          pattern: image-ref-*
          path: image-refs
          merge-multiple: true

      - name: Rewrite GitOps image references
        run: |
          gateway_ref="$(cat image-refs/image-ref-gateway-service.txt)"
          catalog_ref="$(cat image-refs/image-ref-catalog-service.txt)"
          inventory_ref="$(cat image-refs/image-ref-inventory-service.txt)"

          sed -i "s#^\([[:space:]]*image: \).*gateway-service.*#\1${gateway_ref}#" deploy/gitops/demo/gateway-deployment.yaml
          sed -i "s#^\([[:space:]]*image: \).*catalog-service.*#\1${catalog_ref}#" deploy/gitops/demo/catalog-deployment.yaml
          sed -i "s#^\([[:space:]]*image: \).*inventory-service.*#\1${inventory_ref}#" deploy/gitops/demo/inventory-deployment.yaml

      - name: Commit updated GitOps manifests
        run: |
          if git diff --quiet -- deploy/gitops/demo; then
            echo "No GitOps changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/gitops/demo
          git commit -m "Update GitOps image refs for ${GITHUB_SHA::7}"
          git push
